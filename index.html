    <!-- Structured data: FAQPage -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": [
          {
            "@type": "Question",
            "name": "¿Es cara la automatización con IA para empresas?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Trabajamos con un modelo basado en ROI: el sistema se paga solo en los primeros meses. Antes de cualquier propuesta entregamos una estimación clara de coste y retorno esperado, sin sorpresas."
            }
          },
          {
            "@type": "Question",
            "name": "¿Cuánto tarda la implementación de IA en una empresa?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Entre 2 y 6 semanas según la complejidad. Los primeros automatismos funcionan desde la semana 1 y liberamos módulos por fases para que el impacto sea progresivo."
            }
          },
          {
            "@type": "Question",
            "name": "¿Necesito un equipo técnico para automatizar tareas con IA?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "No. Nos encargamos del diseño, despliegue, integración y formación. Tu equipo solo necesita usar las herramientas que ya conoce."
            }
          },
          {
            "@type": "Question",
            "name": "¿Qué tipo de empresas pueden beneficiarse de la IA?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Pymes y empresas con procesos repetitivos: clínicas, despachos, ecommerce, agencias, servicios B2B y hospitality en España."
            }
          },
          {
            "@type": "Question",
            "name": "¿Cuándo veré resultados con la automatización IA?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Resultados operativos visibles en 2–4 semanas e impacto medible en P&L (ahorro de horas, conversión, retención) entre el mes 2 y 3."
            }
          }
        ]
      }
    </script>
